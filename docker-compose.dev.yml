version: "3.8"

# dev.unisize.org로 노출할 프론트엔드 dev 빌드입니다.
# docker-compose.yml(prod)이 이미 호스트 3000번 포트를 쓰고 있으므로
# 충돌을 피하기 위해 이 컨테이너는 3001번 포트를 사용합니다.
# Cloudflare에서 dev.unisize.org를 이 호스트의 3001번 포트로 라우팅해주세요
# (Tunnel이면 ingress에 http://localhost:3001 추가, 프록시 DNS면 그에 맞는 방식으로).
#
# API는 dev-api.unisize.org(unisize-server 리포의 docker-compose.dev-server.yml)를
# 바라보도록 빌드합니다.

services:
  unisize-front-dev:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - VITE_API_BASE_URL=https://dev-api.unisize.org
    image: unisize-front:dev
    container_name: unisize-front-dev
    restart: unless-stopped
    ports:
      - "3001:80"
    environment:
      - NODE_ENV=production
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:80/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    labels:
      - "com.unisize.service=frontend"
      - "com.unisize.environment=development"
